services:
  - type: web
    name: airline-operations-center-api
    env: node
    rootDir: muc_online_app
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: muc-uploads
      mountPath: /var/data/uploads
      sizeGB: 10
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: COOKIE_SECURE
        value: "true"
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
